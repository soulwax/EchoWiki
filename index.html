<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="EchoWarrior maintainer wiki for the main Rust crate files and GitHub Pages documentation."
    />
    <title>EchoWarrior Wiki</title>
    <link rel="icon" href="assets/readme-window.png" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css"
    />
    <link rel="stylesheet" href="assets/wiki.css" />
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  </head>
  <body>
    <div id="app">Loading EchoWarrior wiki...</div>
    <script>
      window.$docsify = {
        name: "EchoWarrior Wiki",
        repo: "",
        loadSidebar: true,
        subMaxLevel: 2,
        auto2top: true,
        maxLevel: 3,
        search: {
          depth: 4,
          noData: "No matches.",
          placeholder: "Search the wiki",
        },
        copyCode: {
          buttonText: "Copy",
          errorText: "Error",
          successText: "Copied",
        },
        pagination: {
          previousText: "Previous",
          nextText: "Next",
          crossChapter: true,
        },
      };
      mermaid.initialize({
        startOnLoad: false,
        theme: "base",
        themeVariables: {
          primaryColor: "#fff5e6",
          primaryTextColor: "#1d242b",
          primaryBorderColor: "#b8742a",
          lineColor: "#5f6b76",
          secondaryColor: "#e9f0ee",
          tertiaryColor: "#f8fafb",
          fontFamily:
            "Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif",
        },
      });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-mermaid@2/dist/docsify-mermaid.js"></script>
  </body>
</html>
